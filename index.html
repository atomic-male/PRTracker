<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>PR Tracker (View Only)</title>
<style>
  /* Use the exact same CSS as your write version to keep styling identical */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #0f1117; --surface: #181c27; --surface2: #1e2333; --border: #2a2f45; --accent: #4f7ef8; --text: #e8eaf6; --muted: #7880a0; --mono: 'Cascadia Code', 'Fira Mono', monospace; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 32px; }
  header h1 { font-size: 18px; font-weight: 600; color: var(--text); }
  .table-wrap { padding: 32px; }
  table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 10px; border: 1px solid var(--border); }
  thead th { background: var(--surface2); color: var(--muted); padding: 12px 16px; text-align: left; border-bottom: 1px solid var(--border); }
  tbody tr { border-bottom: 1px solid var(--border); }
  td { padding: 12px 16px; color: var(--text); }
  .pr-num { font-family: var(--mono); color: var(--accent); }
</style>
</head>
<body>

<header><h1>PR <span>Tracker (Read-Only)</span></h1></header>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th>PR #</th>
        <th>Vendor</th>
        <th>Description</th>
        <th>Status</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
let prs = [];

async function loadFromGitHub() {
  try {
    // Fetches the JSON file directly from your GitHub repository
    const response = await fetch('data.json');
    prs = await response.json();
    
    const tbody = document.getElementById('tbody');
    tbody.innerHTML = prs.map(p => `
      <tr>
        <td><span class="pr-num">${p.pr_number}</span></td>
        <td>${p.vendor}</td>
        <td>${p.description}</td>
        <td>${p.status}</td>
        <td>${p.notes || '—'}</td>
      </tr>
    `).join('');
  } catch (err) {
    console.error("Sync failed:", err);
  }
}

// Initial load
loadFromGitHub();

// Refresh automatically every 30 seconds
setInterval(loadFromGitHub, 30000);
</script>

</body>
</html>
